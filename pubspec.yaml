name: flutter_base
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0
dependencies:
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter

  # Common
  equatable: ^2.0.7
  dartz: ^0.10.1
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  share_plus: ^11.0.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  pub_semver: ^2.2.0
  package_info_plus: ^8.0.0

  # Assets
  flutter_svg: ^2.2.1
  cached_network_image: ^3.4.1
  lottie: ^3.3.2
  bounce: ^1.0.2
  flutter_native_splash: ^2.4.6
  flutter_gen: any

  # Media Pickers
  image_picker: ^1.2.0
  file_picker: ^10.3.3

  # Network
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0
  socket_io_client: ^2.0.3+1

  # UI
  cupertino_icons: ^1.0.8
  responsive_framework: ^1.5.1
  fluttertoast: ^9.0.0

  # State Management
  flutter_bloc: ^9.1.1

  # Dependency Injection & Service Locator
  get_it: ^8.2.0
  injectable: ^2.5.1

  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Firebase
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.2
  firebase_remote_config: ^6.1.3

  # Local Notifications
  flutter_local_notifications: ^19.4.2
  flutter_animate: ^4.5.2
  pin_code_fields: ^8.0.1
  hijri: ^3.0.0
  google_maps_flutter: ^2.14.0
  location: ^8.0.1
  permission_handler: ^12.0.1
  flutter_html: ^3.0.0-beta.2
  easy_date_timeline: ^2.0.9
  fl_chart: ^0.69.0
  vibration: ^3.1.8
  in_app_review: ^2.0.11
  app_links: ^7.0.0
  pusher_channels_flutter: ^2.4.0

# dependency_overrides:
#   intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  injectable_generator:
  flutter_launcher_icons: ^0.14.3
  flutter_gen_runner: any

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/illustrations/
    - assets/lotties/
    - assets/popular_sites_icons/

  fonts:
    # - family: ElMessiri
    #   fonts:
    #     - asset: assets/fonts/elmessiri/ElMessiri-SemiBold.ttf
    #       weight: 600
    #     - asset: assets/fonts/elmessiri/ElMessiri-Medium.ttf
    #       weight: 500
    #     - asset: assets/fonts/elmessiri/ElMessiri-Regular.ttf
    #       weight: 400

    - family: Riyal
      fonts:
        - asset: assets/fonts/riyal/riyal.ttf

flutter_gen:
  output: lib/core/configs/values/
  fonts:
    enabled: false

  integrations:
    image: false
    flutter_svg: false
